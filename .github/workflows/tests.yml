# FormFlow Lite — test + security gate (Testing Protocol v2 nets + CLASS-007)
#
# Realistic scope: the property (net 6) and contract (net 7) suites are PURE PHP
# and need no WordPress boot, so they are the blocking gate. The CLASS-007 static
# foot-gun gate (semgrep) is also blocking. composer audit (net 2) runs
# non-blocking for now and is wired to ratchet to blocking later.
name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  static-footguns:
    name: CLASS-007 static foot-gun gate
    runs-on: [self-hosted, linux, peanut-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install semgrep
        run: pip install semgrep

      - name: Run CLASS-007 PHP foot-gun rule (blocking)
        run: semgrep --config .peanut/static-rules/peanut-php-footguns.yml includes/ --error

  security:
    name: Net 2 — dependency audit (non-blocking)
    runs-on: [self-hosted, linux, peanut-ci]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: composer audit
        # Start non-blocking; ratchet to blocking once the tree is clean.
        run: composer audit --no-interaction || true

  php-tests:
    name: Net 6 + 7 — property & contract (blocking)
    runs-on: [self-hosted, linux, peanut-ci]
    strategy:
      fail-fast: true
      matrix:
        php-version: [ "8.2", "8.3" ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: xml
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Property tests (net 6)
        run: vendor/bin/phpunit -c phpunit.property.xml

      - name: Contract tests (net 7)
        run: vendor/bin/phpunit -c phpunit.contract.xml
