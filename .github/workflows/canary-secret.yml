# Seeded-defect canary (GAP-11a) — proves the secret-scan detector still works.
#
# A gate nobody verifies is a gate nobody can trust. This seeds a KNOWN FAKE
# secret and asserts gitleaks (+ our .gitleaks.toml) still flags it. If it does
# NOT — someone over-broadened the allowlist, or the tooling regressed — the job
# fails (a missed canary). Wire a pager to this workflow's failure (GAP-20).
#
# The canary is generated at runtime in a temp dir, so nothing secret-looking is
# ever committed (the per-PR secret-scan gate stays clean).
name: canary-secret-scan

on:
  schedule:
    - cron: '17 8 * * 1' # weekly, Monday 08:17 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: [self-hosted, linux, peanut-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Seed a fake secret and assert it is detected
        run: |
          set -euo pipefail

          # Use the repo's gitleaks config if present (so the canary tests the
          # REAL config, incl. its allowlist), else gitleaks' default ruleset.
          CONFIG_FLAG=""
          if [ -f .gitleaks.toml ]; then
            CONFIG_FLAG="--config .gitleaks.toml"
          fi

          TMP="$(mktemp -d)"
          # Build the fake secrets at runtime with random entropy, so NO
          # secret-looking literal exists at rest in this committed file
          # (otherwise the secret-scan gate would — correctly — flag this
          # workflow). The split prefixes ("sk"/"_live_") keep the rule keyword
          # out of the committed file too; the full token only ever exists in the
          # throwaway temp file below.
          SK="sk""_live_""$(openssl rand -hex 24)"
          AK="api""_key=""$(openssl rand -hex 32)"
          {
            echo "# GITLEAKS CANARY — deliberately fake secrets, expected to be DETECTED."
            echo "stripe_live_key = \"${SK}\""
            echo "generic_api = \"${AK}\""
          } > "$TMP/canary.txt"

          # gitleaks exits 1 when it finds leaks (the GOOD outcome here), 0 when
          # it finds none (the canary was MISSED -> detection is broken).
          if gitleaks dir "$TMP" $CONFIG_FLAG --no-banner; then
            echo "::error title=secret-scan canary::CANARY MISSED — gitleaks did not detect the seeded fake secret. Secret detection is BROKEN (config over-allowlisted or tooling regressed). Fix before trusting the secret-scan gate."
            exit 1
          fi

          echo "✓ Canary detected — the secret-scan detector is healthy."
