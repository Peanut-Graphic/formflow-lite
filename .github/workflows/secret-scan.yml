# Secret-scan gate (GAP-01) — blocking on every PR + push.
# Canonical Peanut template; copy verbatim into any repo and make it a REQUIRED
# status check in branch protection. See docs/testing-program/reusable/secret-scan/.
#
# Scans the commits introduced by this PR/push (not full history) so a new
# secret cannot land, without failing on pre-existing historical findings —
# those are handled by the one-time `gitleaks git --log-opts=--all` sweep +
# credential rotation. Uses the gitleaks binary directly (no gitleaks-action
# org-license dependency).
name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base commit to diff against

      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Determine commit range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "log_opts=${{ github.event.pull_request.base.sha }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "log_opts=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            # New branch / first push: scan the latest commit only.
            echo "log_opts=${{ github.sha }}~1..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan for secrets (blocking)
        run: |
          gitleaks git . \
            --redact \
            --config .gitleaks.toml \
            --log-opts="${{ steps.range.outputs.log_opts }}" \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif
